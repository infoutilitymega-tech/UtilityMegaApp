<header>

<div class="tool-container">

<div class="input-group">
<label>Select Your Date of Birth</label>
<input type="date" id="dob">
</div>

<div class="btn-group">
<button onclick="calculateAge()">Calculate Age</button>
<button onclick="clearForm()">Clear</button>
</div>

<h2>Result</h2>

<textarea id="result" readonly placeholder="Your age will appear here..."></textarea>

<div id="message" class="message"></div>

</div>

<footer>
<p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>

function calculateAge(){

let dob=document.getElementById("dob").value;
let resultBox=document.getElementById("result");
let message=document.getElementById("message");

if(!dob){
message.innerHTML="<span class='error'>Please select your date of birth ❌</span>";
return;
}

let birthDate=new Date(dob);
let today=new Date();

let years=today.getFullYear()-birthDate.getFullYear();
let months=today.getMonth()-birthDate.getMonth();
let days=today.getDate()-birthDate.getDate();

if(days<0){
months--;
days+=new Date(today.getFullYear(),today.getMonth(),0).getDate();
}

if(months<0){
years--;
months+=12;
}

resultBox.value="Your Age: "+years+" Years, "+months+" Months, "+days+" Days";

message.innerHTML="<span class='success'>Calculation Completed ✔</span>";

}

function clearForm(){
document.getElementById("dob").value="";
document.getElementById("result").value="";
document.getElementById("message").innerHTML="";
}

</script>
