<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>BMI Calculator Online Free | UtilityMega</title>

<meta name="description" content="Free BMI calculator tool. Calculate your Body Mass Index instantly using height and weight.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/x-icon" href="../assets/icon.webp">
<link rel="stylesheet" href="../style.css">

<style>
    .tool-container {
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
}

.input-group {
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
}

.input-group input {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.btn-group {
    text-align: center;
    margin: 20px 0;
}

button {
    padding: 10px 18px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    background: #2a5298;
    color: white;
    transition: 0.3s;
}

button:hover {
    background: #1e3c72;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 12px;
    font-family: monospace;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
    resize: none;
    margin-top: 10px;
}

.message {
    font-weight: bold;
    margin-top: 10px;
    text-align: center;
}

.success {
    color: green;
}

.error {
    color: red;
}
</style>
</head>

<body>

<header>
<h1>BMI Calculator</h1>
<p>Check your Body Mass Index instantly.</p>
</header>

<nav>
<a href="../index.html">Home</a> |
    <a href="../calculators/index.html">Calculators</a> |
    <a href="../developer-tools/index.html">Developer Tools</a> |
    <a href="../security-tools/index.html">Security Tools</a> |
    <a href="../text-tools/index.html">Text Tools</a>
</nav>

<div class="tool-container">

<!-- <h2>Enter Your Details</h2> -->

<div class="input-group">
<label>Weight (kg)</label>
<input type="number" id="weight" placeholder="Enter weight in kg">
</div>

<div class="input-group">
<label>Height (cm)</label>
<input type="number" id="height" placeholder="Enter height in cm">
</div>

<div class="btn-group">
<button onclick="calculateBMI()">Calculate BMI</button>
<button onclick="clearForm()">Clear</button>
</div>

<h2>Result</h2>

<textarea id="result" readonly placeholder="Your BMI result will appear here..."></textarea>

<div id="message" class="message"></div>

</div>

<footer>
<p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>

function calculateBMI(){

let weight = document.getElementById("weight").value;
let height = document.getElementById("height").value;
let resultBox = document.getElementById("result");
let message = document.getElementById("message");

if(weight && height){

let heightMeters = height / 100;
let bmi = weight / (heightMeters * heightMeters);

let category = "";

if (bmi < 18.5){
category = "Underweight";
}
else if (bmi < 24.9){
category = "Normal Weight";
}
else if (bmi < 29.9){
category = "Overweight";
}
else{
category = "Obese";
}

resultBox.value = "Your BMI: " + bmi.toFixed(2) + " (" + category + ")";
message.innerHTML = "<span class='success'>Calculation Completed ✔</span>";

}else{

message.innerHTML = "<span class='error'>Please enter weight and height ❌</span>";

}

}

function clearForm(){
document.getElementById("weight").value = "";
document.getElementById("height").value = "";
document.getElementById("result").value = "";
document.getElementById("message").innerHTML = "";
}

</script>

</body>
</html>
