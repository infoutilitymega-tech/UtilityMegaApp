<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Calculator - ToolSathi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f6fb;
}

header {
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    padding: 25px;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.container h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #243b55;
}

.input-group {
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #243b55;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1b2d40;
}

.result {
    margin-top: 20px;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    color: #141e30;
}

.back-btn {
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    color: #243b55;
    font-size: 14px;
}
</style>

<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>

<body>

<header>
    <h1>EMI Calculator</h1>
</header>

<div class="container">
    <h2>Calculate Your EMI</h2>

    <div class="input-group">
        <label>Loan Amount (₹)</label>
        <input type="number" id="loan">
    </div>

    <div class="input-group">
        <label>Interest Rate (% per year)</label>
        <input type="number" id="rate">
    </div>

    <div class="input-group">
        <label>Tenure (Months)</label>
        <input type="number" id="months">
    </div>

    <button onclick="calculateEMI()">Calculate EMI</button>

    <div class="result" id="result"></div>

    <a href="../index.html" class="back-btn">← Back to Dashboard</a>
</div>

<script>
function calculateEMI() {
    let P = document.getElementById("loan").value;
    let R = document.getElementById("rate").value / 12 / 100;
    let N = document.getElementById("months").value;

    if(P && R && N){
        let EMI = (P * R * Math.pow(1+R, N)) / (Math.pow(1+R, N) - 1);
        document.getElementById("result").innerText = "Monthly EMI: ₹ " + EMI.toFixed(2);
    } else {
        document.getElementById("result").innerText = "Please fill all fields.";
    }
}
</script>

</body>
</html>
