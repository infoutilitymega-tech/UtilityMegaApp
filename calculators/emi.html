<head>

max-width:600px;
margin:40px auto;

.input-group{
margin-bottom:15px;

.input-group label{

.input-group input{

padding:12px;
font-size:14px;
border-radius:8px;
border:1px solid #ccc;
}

.btn-group{
text-align:center;
margin:20px 0;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
background:#2a5298;
color:white;
transition:0.3s;
}

button:hover{
background:#1e3c72;
}

textarea{
width:100%;
height:140px;
padding:12px;
font-family:monospace;
font-size:14px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
margin-top:10px;
}

.message{
font-weight:bold;
margin-top:10px;
text-align:center;
}

.success{
color:green;
}

.error{
color:red;
}

<body>

<header>
<h1>EMI Calculator</h1>
<p>Calculate your loan EMI instantly.</p>
</header>

<nav>
<a href="../index.html">Home</a> |
    <a href="../calculators/index.html">Calculators</a> |
    <a href="../developer-tools/index.html">Developer Tools</a> |
    <a href="../security-tools/index.html">Security Tools</a> |
    <a href="../text-tools/index.html">Text Tools</a>
</nav>

<div class="tool-container">

<div class="input-group">
<label>Loan Amount (₹)</label>
<input type="number" id="loan" placeholder="Enter loan amount">
</div>

<div class="input-group">
<label>Interest Rate (%)</label>
<input type="number" id="rate" placeholder="Enter annual interest rate">
</div>

<div class="input-group">
<label>Loan Tenure (Months)</label>
<input type="number" id="months" placeholder="Enter number of months">
</div>

<div class="btn-group">
<button onclick="calculateEMI()">Calculate EMI</button>
<button onclick="clearForm()">Clear</button>
</div>

<h2>Result</h2>

<textarea id="result" readonly placeholder="EMI result will appear here..."></textarea>

<div id="message" class="message"></div>

</div>

<footer>
<p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>

function calculateEMI(){

let loan=document.getElementById("loan").value;
let rate=document.getElementById("rate").value;
let months=document.getElementById("months").value;

let resultBox=document.getElementById("result");
let message=document.getElementById("message");

if(!loan || !rate || !months){

message.innerHTML="<span class='error'>Please fill all fields ❌</span>";
return;

}

let monthlyRate=(rate/100)/12;

let emi=(loan*monthlyRate*Math.pow(1+monthlyRate,months))/
(Math.pow(1+monthlyRate,months)-1);

let totalPayment=emi*months;

let totalInterest=totalPayment-loan;

resultBox.value=
"Monthly EMI: ₹"+emi.toFixed(2)+
"\nTotal Payment: ₹"+totalPayment.toFixed(2)+
"\nTotal Interest: ₹"+totalInterest.toFixed(2);

message.innerHTML="<span class='success'>Calculation Completed ✔</span>";

}

function clearForm(){

document.getElementById("loan").value="";
document.getElementById("rate").value="";
document.getElementById("months").value="";
document.getElementById("result").value="";
document.getElementById("message").innerHTML="";

}

</script>
