<html lang="en">
<head>
<meta charset="UTF-8">

<title>GST Calculator Online Free | UtilityMega</title>

<meta name="description" content="Free GST calculator tool. Calculate GST amount and total price instantly by entering price and GST rate.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/x-icon" href="../assets/icon.webp">

<style>
.tool-container{
  max-width:600px;
  margin:40px auto;
  padding:20px;
}

.input-group{
  margin-bottom:15px;
}

.input-group label{
  display:block;
  margin-bottom:6px;
  font-weight:500;
}

.input-group input{
  width:100%;
  padding:12px;
  font-size:14px;
  border-radius:8px;
  border:1px solid #ccc;
}

.btn-group{
  text-align:center;
  margin:20px 0;
}

button{
  padding:10px 18px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  background:#2a5298;
  color:white;
  transition:0.3s;
}

button:hover{
  background:#1e3c72;
}

textarea{
  width:100%;
  height:140px;
  padding:12px;
  font-family:monospace;
  font-size:14px;
  border-radius:8px;
  border:1px solid #ccc;
  resize:none;
  margin-top:10px;
}

.message{
  font-weight:bold;
  margin-top:10px;
  text-align:center;
}

.success{
  color:green;
}

.error{
  color:red;
}
</style>

<body>

<header>
<h1>GST Calculator</h1>
<p>Calculate GST amount and total price instantly.</p>
</header>

<nav>
<a href="../index.html">Home</a> |
<a href="../calculators/index.html">Calculators</a> |
<a href="../image-tools/index.html">Image Tools</a> |
<a href="../developer-tools/index.html">Developer Tools</a> |
<a href="../security-tools/index.html">Security Tools</a> |
<a href="../text-tools/index.html">Text Tools</a>
</nav>

<div class="tool-container">

<div class="input-group">
  <label>Price (₹)</label>
  <input type="number" id="price" placeholder="Enter price" value="1000">
</div>

<div class="input-group">
  <label>GST Rate (%)</label>
  <input type="number" id="gstRate" placeholder="Enter GST rate" value="18">
</div>

<div class="btn-group">
  <button onclick="calculateGST()">Calculate GST</button>
  <button onclick="clearForm()">Clear</button>
</div>

<h2>Result</h2>
<textarea id="result" readonly placeholder="GST result will appear here..."></textarea>
<div id="message" class="message"></div>

</div>

<footer>
<p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>
    window.onload = function() {
  calculateGST(); // automatically calculate with pre-filled values
};
function calculateGST() {
  let price = parseFloat(document.getElementById("price").value);
  let gstRate = parseFloat(document.getElementById("gstRate").value);

  let resultBox = document.getElementById("result");
  let message = document.getElementById("message");

  if (!price || !gstRate) {
    message.innerHTML = "<span class='error'>Please fill all fields ❌</span>";
    return;
  }

  let gstAmount = (price * gstRate) / 100;
  let totalPrice = price + gstAmount;

  resultBox.value =
    "Original Price: ₹" + price.toFixed(2) +
    "\nGST Amount: ₹" + gstAmount.toFixed(2) +
    "\nTotal Price: ₹" + totalPrice.toFixed(2);

  message.innerHTML = "<span class='success'>Calculation Completed ✔</span>";
}

function clearForm() {
  document.getElementById("price").value = "1000";
  document.getElementById("gstRate").value = "18";
  document.getElementById("result").value = "";
  document.getElementById("message").innerHTML = "";
}
</script>
