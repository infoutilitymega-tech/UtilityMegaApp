<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Percentage Calculator Online Free | UtilityMega</title>

<meta name="description" content="Free percentage calculator. Quickly calculate percentages online such as X% of Y.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/x-icon" href="../assets/icon.webp">
<link rel="stylesheet" href="../style.css">

<style>

.tool-container{
max-width:600px;
margin:40px auto;
padding:20px;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:6px;
font-weight:500;
}

.input-group input{
width:100%;
padding:12px;
font-size:14px;
border-radius:8px;
border:1px solid #ccc;
}

.btn-group{
text-align:center;
margin:20px 0;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
background:#2a5298;
color:white;
transition:0.3s;
}

button:hover{
background:#1e3c72;
}

textarea{
width:100%;
height:120px;
padding:12px;
font-family:monospace;
font-size:14px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
margin-top:10px;
}

.message{
font-weight:bold;
margin-top:10px;
text-align:center;
}

.success{
color:green;
}

.error{
color:red;
}

</style>

</head>

<body>

<header>
<h1>Percentage Calculator</h1>
<p>Calculate percentages quickly and easily.</p>
</header>

<nav>
<a href="../index.html">Home</a> |
    <a href="../calculators/index.html">Calculators</a> |
    <a href="../developer-tools/index.html">Developer Tools</a> |
    <a href="../security-tools/index.html">Security Tools</a> |
    <a href="../text-tools/index.html">Text Tools</a>
</nav>

<div class="tool-container">

<div class="input-group">
<label>Percentage (%)</label>
<input type="number" id="percent" placeholder="Enter percentage">
</div>

<div class="input-group">
<label>Number</label>
<input type="number" id="number" placeholder="Enter number">
</div>

<div class="btn-group">
<button onclick="calculatePercentage()">Calculate</button>
<button onclick="clearForm()">Clear</button>
</div>

<h2>Result</h2>

<textarea id="result" readonly placeholder="Result will appear here..."></textarea>

<div id="message" class="message"></div>

</div>

<footer>
<p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>

function calculatePercentage(){

let percent=document.getElementById("percent").value;
let number=document.getElementById("number").value;

let resultBox=document.getElementById("result");
let message=document.getElementById("message");

if(!percent || !number){

message.innerHTML="<span class='error'>Please fill all fields ❌</span>";
return;

}

let result=(percent/100)*number;

resultBox.value=percent+"% of "+number+" = "+result;

message.innerHTML="<span class='success'>Calculation Completed ✔</span>";

}

function clearForm(){

document.getElementById("percent").value="";
document.getElementById("number").value="";
document.getElementById("result").value="";
document.getElementById("message").innerHTML="";

}

</script>

</body>
</html>
