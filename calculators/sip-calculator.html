resize:none;
margin-top:10px;

<body>

<header>
<h1>SIP Calculator</h1>
<p>Calculate your expected returns from monthly investments.</p>
</header>

<nav>
<a href="../index.html">Home</a> |
<a href="../calculators/index.html">Calculators</a> |
<a href="../image-tools/index.html">Image Tools</a> |
<a href="../developer-tools/index.html">Developer Tools</a> |
<a href="../security-tools/index.html">Security Tools</a> |

</nav>

<div class="tool-container">

<div class="input-group">
  <label>Monthly Investment (₹)</label>
  <input type="number" id="investment" placeholder="Enter monthly investment" value="5000">
</div>

<div class="input-group">
  <label>Expected Annual Return Rate (%)</label>
  <input type="number" id="rate" placeholder="Enter annual return rate" value="12">
</div>

<div class="input-group">
  <label>Investment Tenure (Years)</label>
  <input type="number" id="years" placeholder="Enter number of years" value="10">
</div>

<div class="btn-group">
<button onclick="calculateSIP()">Calculate SIP</button>
<button onclick="clearForm()">Clear</button>
</div>

<h2>Result</h2>

<textarea id="result" readonly placeholder="SIP result will appear here..."></textarea>

<div id="message" class="message"></div>

</div>

<footer>
<p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>
window.onload = function() {
  calculateSIP(); // automatically calculate with pre-filled values
};
function calculateSIP() {
  let investment = document.getElementById("investment").value;
  let rate = document.getElementById("rate").value;
  let years = document.getElementById("years").value;

  let resultBox = document.getElementById("result");
  let message = document.getElementById("message");

  if (!investment || !rate || !years) {
    message.innerHTML = "<span class='error'>Please fill all fields ❌</span>";
    return;
  }

  let n = years * 12;
  let r = rate / 12 / 100; // monthly rate
  let sipValue = investment * (Math.pow(1 + r, n) - 1) / r * (1 + r); // future value formula

  resultBox.value =
    "Total Investment: ₹" + (investment * n).toFixed(2) +
    "\nExpected Returns: ₹" + sipValue.toFixed(2) +
    "\nProfit: ₹" + (sipValue - investment * n).toFixed(2);

  message.innerHTML = "<span class='success'>Calculation Completed ✔</span>";
}

function clearForm() {
  document.getElementById("investment").value = "";
  document.getElementById("rate").value = "";
  document.getElementById("years").value = "";
  document.getElementById("result").value = "";
  document.getElementById("message").innerHTML = "";
}
</script>
