<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Minifier Online Free | UtilityMega</title>
    <meta name="description" content="Free online CSS minifier tool. Compress and minify CSS code instantly to reduce file size and improve website performance.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../style.css">

    <style>
        .tool-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
            margin-bottom: 15px;
        }

        .btn-group {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            background: #2a5298;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .message {
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<header>
    <h1>CSS Minifier</h1>
    <p>Compress and minify CSS code instantly.</p>
</header>

<nav>
    <a href="../index.html">Home</a>
    <a href="index.html">Developer Tools</a>
    <a href="../contact.html">Contact</a>
</nav>

<div class="tool-container">

    <h2>Paste CSS Code</h2>
    <textarea id="inputCSS" placeholder="Paste your CSS code here..."></textarea>

    <div class="btn-group">
        <button onclick="minifyCSS()">Minify CSS</button>
        <button onclick="copyOutput()">Copy</button>
        <button onclick="clearText()">Clear</button>
    </div>

    <h2>Minified Output</h2>
    <textarea id="outputCSS" placeholder="Minified CSS will appear here..."></textarea>

    <div id="message" class="message"></div>

</div>

<footer>
    <p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>
function minifyCSS() {
    const input = document.getElementById("inputCSS").value;
    const output = document.getElementById("outputCSS");
    const message = document.getElementById("message");

    try {
        let minified = input
            .replace(/\/\*[\s\S]*?\*\//g, '')  // Remove comments
            .replace(/\s+/g, ' ')              // Remove extra whitespace
            .replace(/\s*{\s*/g, '{')
            .replace(/\s*}\s*/g, '}')
            .replace(/\s*;\s*/g, ';')
            .replace(/\s*:\s*/g, ':')
            .replace(/\s*,\s*/g, ',')
            .replace(/;}/g, '}')
            .trim();

        output.value = minified;
        message.innerHTML = "<span class='success'>CSS Minified Successfully ✔</span>";
    } catch (e) {
        message.innerHTML = "<span class='error'>Something went wrong ❌</span>";
    }
}

function copyOutput() {
    const output = document.getElementById("outputCSS");
    output.select();
    document.execCommand("copy");
    document.getElementById("message").innerHTML = "<span class='success'>Copied to Clipboard ✔</span>";
}

function clearText() {
    document.getElementById("inputCSS").value = "";
    document.getElementById("outputCSS").value = "";
    document.getElementById("message").innerHTML = "";
}
</script>

</body>
</html>
