<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSON Formatter & Validator Online Free | UtilityMega</title>
    <meta name="description" content="Format and validate JSON online instantly. Free JSON formatter tool with clean output and error detection.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Main CSS -->
    <link rel="stylesheet" href="../style.css">

    <style>
        .formatter-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
            margin-bottom: 15px;
        }

        .btn-group {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            background: #2a5298;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .error {
            color: red;
            font-weight: bold;
            margin-top: 10px;
        }

        .success {
            color: green;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
       <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<header>
    <h1>JSON Formatter</h1>
    <p>Format and validate JSON data instantly.</p>
</header>

<nav>
   <a href="../index.html">Home</a> |
    <a href="../calculators/index.html">Calculators</a> |
    <a href="../developer-tools/index.html">Developer Tools</a> |
    <a href="../security-tools/index.html">Security Tools</a> |
    <a href="../text-tools/index.html">Text Tools</a>
</nav>

<div class="formatter-container">

    <h2>Enter JSON Below</h2>

    <textarea id="jsonInput" placeholder='Paste your JSON here...'></textarea>

    <div class="btn-group">
        <button onclick="formatJSON()">Format JSON</button>
        <button onclick="minifyJSON()">Minify</button>
        <button onclick="clearJSON()">Clear</button>
    </div>

    <textarea id="jsonOutput" placeholder="Formatted result will appear here..."></textarea>

    <div id="message"></div>

</div>

<footer>
    <p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>
function formatJSON() {
    const input = document.getElementById("jsonInput").value;
    const output = document.getElementById("jsonOutput");
    const message = document.getElementById("message");

    try {
        const parsed = JSON.parse(input);
        output.value = JSON.stringify(parsed, null, 4);
        message.innerHTML = "<span class='success'>Valid JSON ✔</span>";
    } catch (error) {
        message.innerHTML = "<span class='error'>Invalid JSON ❌</span>";
    }
}

function minifyJSON() {
    const input = document.getElementById("jsonInput").value;
    const output = document.getElementById("jsonOutput");
    const message = document.getElementById("message");

    try {
        const parsed = JSON.parse(input);
        output.value = JSON.stringify(parsed);
        message.innerHTML = "<span class='success'>Minified Successfully ✔</span>";
    } catch (error) {
        message.innerHTML = "<span class='error'>Invalid JSON ❌</span>";
    }
}

function clearJSON() {
    document.getElementById("jsonInput").value = "";
    document.getElementById("jsonOutput").value = "";
    document.getElementById("message").innerHTML = "";
}
</script>

</body>
</html>
