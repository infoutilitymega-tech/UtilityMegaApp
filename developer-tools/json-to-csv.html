<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSON to CSV Converter Online | UtilityMega</title>
    <meta name="description" content="Free online JSON to CSV converter tool. Convert JSON data to CSV format instantly and download as CSV file.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../style.css">

    <style>
        .tool-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 12px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 18px;
            margin: 5px 5px 15px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            background: #2a5298;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .error {
            color: red;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>JSON to CSV Converter</h1>
    <p>Convert JSON data into CSV format instantly.</p>
</header>

<nav>
   <a href="../index.html">Home</a> |
    <a href="../calculators/index.html">Calculators</a> |
    <a href="../developer-tools/index.html">Developer Tools</a> |
    <a href="../security-tools/index.html">Security Tools</a> |
    <a href="../text-tools/index.html">Text Tools</a>
</nav>

<div class="tool-container">

    <h2>Paste JSON Data</h2>
    <textarea id="jsonInput" placeholder='Example:
[
  {"name":"John","age":30},
  {"name":"Jane","age":25}
]'></textarea>

    <button onclick="convertToCSV()">Convert to CSV</button>
    <button onclick="downloadCSV()">Download CSV</button>
    <button onclick="clearAll()">Clear</button>

    <h2>CSV Output</h2>
    <textarea id="csvOutput" placeholder="CSV output will appear here..."></textarea>

    <div id="errorMessage" class="error"></div>

</div>

<footer>
    <p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>
let generatedCSV = "";

function convertToCSV() {
    const input = document.getElementById("jsonInput").value;
    const errorMessage = document.getElementById("errorMessage");
    errorMessage.innerText = "";

    try {
        const jsonData = JSON.parse(input);

        if (!Array.isArray(jsonData)) {
            throw new Error("JSON must be an array of objects.");
        }

        const headers = Object.keys(jsonData[0]);
        const rows = jsonData.map(obj =>
            headers.map(header => `"${obj[header] ?? ""}"`).join(",")
        );

        generatedCSV = headers.join(",") + "\n" + rows.join("\n");
        document.getElementById("csvOutput").value = generatedCSV;

    } catch (error) {
        errorMessage.innerText = "Invalid JSON format or structure.";
    }
}

function downloadCSV() {
    if (!generatedCSV) return;

    const blob = new Blob([generatedCSV], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "converted.csv";
    a.click();

    URL.revokeObjectURL(url);
}

function clearAll() {
    document.getElementById("jsonInput").value = "";
    document.getElementById("csvOutput").value = "";
    document.getElementById("errorMessage").innerText = "";
    generatedCSV = "";
}
</script>

</body>
</html>
