<div class="tool-container">

    <h2>Paste JWT Token</h2>
    <textarea id="jwtInput" placeholder="Paste your JWT here..."></textarea>

    <button onclick="decodeJWT()">Decode JWT</button>

    <h2>Header</h2>
    <div id="headerOutput" class="result-box"></div>

    <h2>Payload</h2>
    <div id="payloadOutput" class="result-box"></div>

    <h2>Signature</h2>
    <div id="signatureOutput" class="result-box"></div>

</div>

<script>
function base64UrlDecode(str) {
    str = str.replace(/-/g, '+').replace(/_/g, '/');
    while (str.length % 4) {
        str += '=';
    }
    return decodeURIComponent(atob(str).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
}

function decodeJWT() {
    const token = document.getElementById("jwtInput").value.trim();

    const headerOutput = document.getElementById("headerOutput");
    const payloadOutput = document.getElementById("payloadOutput");
    const signatureOutput = document.getElementById("signatureOutput");

    if (!token) {
        headerOutput.innerHTML = "<span class='error'>Please enter a JWT token</span>";
        return;
    }

    const parts = token.split('.');

    if (parts.length !== 3) {
        headerOutput.innerHTML = "<span class='error'>Invalid JWT format</span>";
        return;
    }

    try {
        const header = JSON.parse(base64UrlDecode(parts[0]));
        const payload = JSON.parse(base64UrlDecode(parts[1]));
        const signature = parts[2];

        headerOutput.innerText = JSON.stringify(header, null, 4);
        payloadOutput.innerText = JSON.stringify(payload, null, 4);
        signatureOutput.innerText = signature;

    } catch (e) {
        headerOutput.innerHTML = "<span class='error'>Invalid Token or Corrupted Data</span>";
    }
}
</script>
