<body>

<header>
    <h1>QR Code Generator</h1>
    <p>Generate QR codes for URL, text, email or phone instantly.</p>
</header>

<nav>
   <a href="../index.html">Home</a> |
    <a href="../calculators/index.html">Calculators</a> |

<div class="tool-container">

    <input type="text" id="qrText" placeholder="Enter URL or text here...">

    <button onclick="generateQR()">Generate QR</button>
    <button onclick="downloadQR()">Download</button>
    <button onclick="clearQR()">Clear</button>

    <div id="qrImage"></div>

</div>

<footer>
    <p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>
let currentQRUrl = "";

function generateQR() {
    const text = document.getElementById("qrText").value.trim();
    if (!text) return;

    const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + encodeURIComponent(text);

    currentQRUrl = qrUrl;

    document.getElementById("qrImage").innerHTML =
        `<img src="${qrUrl}" alt="QR Code">`;
}

function downloadQR() {
    if (!currentQRUrl) return;

    const link = document.createElement("a");
    link.href = currentQRUrl;
    link.download = "qrcode.png";
    link.click();
}

function clearQR() {
    document.getElementById("qrText").value = "";
    document.getElementById("qrImage").innerHTML = "";
    currentQRUrl = "";
}
</script>
