<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Regex Tester Online Free | UtilityMega</title>
    <meta name="description" content="Free online Regex Tester tool. Test and validate regular expressions instantly with live match results.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../style.css">

    <style>
        .tool-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        textarea, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        textarea {
            height: 180px;
            resize: vertical;
        }

        .btn-group {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            background: #2a5298;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .result-box {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid #ddd;
        }

        .match {
            background: yellow;
            font-weight: bold;
        }

        .message {
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
        }

        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

<header>
    <h1>Regex Tester</h1>
    <p>Test and validate regular expressions instantly.</p>
</header>

<nav>
   <a href="../index.html">Home</a> |
    <a href="../calculators/index.html">Calculators</a> |
    <a href="../developer-tools/index.html">Developer Tools</a> |
    <a href="../security-tools/index.html">Security Tools</a> |
    <a href="../text-tools/index.html">Text Tools</a>
</nav>

<div class="tool-container">

    <h2>Regular Expression</h2>
    <input type="text" id="regexInput" placeholder="Example: \d+">

    <h2>Test String</h2>
    <textarea id="testString" placeholder="Enter text to test regex..."></textarea>

    <div class="btn-group">
        <button onclick="testRegex()">Test Regex</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <h2>Result</h2>
    <div id="result" class="result-box"></div>
    <div id="message" class="message"></div>

</div>

<footer>
    <p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>
function testRegex() {
    const pattern = document.getElementById("regexInput").value;
    const text = document.getElementById("testString").value;
    const resultBox = document.getElementById("result");
    const message = document.getElementById("message");

    if (!pattern) {
        message.innerHTML = "<span class='error'>Please enter a regex pattern ❌</span>";
        return;
    }

    try {
        const regex = new RegExp(pattern, "g");
        const matches = text.match(regex);

        if (matches) {
            let highlighted = text.replace(regex, match => `<span class="match">${match}</span>`);
            resultBox.innerHTML = highlighted;
            message.innerHTML = `<span class='success'>${matches.length} match(es) found ✔</span>`;
        } else {
            resultBox.innerHTML = text;
            message.innerHTML = "<span class='error'>No matches found ❌</span>";
        }

    } catch (e) {
        message.innerHTML = "<span class='error'>Invalid Regular Expression ❌</span>";
    }
}

function clearAll() {
    document.getElementById("regexInput").value = "";
    document.getElementById("testString").value = "";
    document.getElementById("result").innerHTML = "";
    document.getElementById("message").innerHTML = "";
}
</script>

</body>
</html>
