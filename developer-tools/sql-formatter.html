<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SQL Formatter Online Free | UtilityMega</title>
    <meta name="description" content="Free online SQL formatter tool. Beautify and format SQL queries instantly for better readability.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../style.css">

    <style>
        .tool-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
            margin-bottom: 15px;
        }

        .btn-group {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            background: #2a5298;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .message {
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
        }

        .success { color: green; }
        .error { color: red; }
    </style>
       <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<header>
    <h1>SQL Formatter</h1>
    <p>Beautify and format your SQL queries instantly.</p>
</header>

<nav>
    <a href="../index.html">Home</a> |
    <a href="../calculators/index.html">Calculators</a> |
    <a href="../developer-tools/index.html">Developer Tools</a> |
    <a href="../security-tools/index.html">Security Tools</a> |
    <a href="../text-tools/index.html">Text Tools</a>
</nav>

<div class="tool-container">

    <h2>Paste SQL Query</h2>
    <textarea id="inputSQL" placeholder="Paste your SQL query here..."></textarea>

    <div class="btn-group">
        <button onclick="formatSQL()">Format SQL</button>
        <button onclick="copyOutput()">Copy</button>
        <button onclick="clearText()">Clear</button>
    </div>

    <h2>Formatted Output</h2>
    <textarea id="outputSQL" placeholder="Formatted SQL will appear here..."></textarea>

    <div id="message" class="message"></div>

</div>

<footer>
    <p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>
function formatSQL() {
    const input = document.getElementById("inputSQL").value;
    const output = document.getElementById("outputSQL");
    const message = document.getElementById("message");

    try {
        let formatted = input
            .replace(/\s+/g, ' ')
            .replace(/(SELECT|FROM|WHERE|GROUP BY|ORDER BY|HAVING|INSERT INTO|VALUES|UPDATE|SET|DELETE FROM|JOIN|LEFT JOIN|RIGHT JOIN|INNER JOIN|OUTER JOIN)/gi, '\n$1')
            .replace(/,/g, ',\n    ')
            .trim();

        output.value = formatted;
        message.innerHTML = "<span class='success'>SQL Formatted Successfully ✔</span>";
    } catch (e) {
        message.innerHTML = "<span class='error'>Something went wrong ❌</span>";
    }
}

function copyOutput() {
    const output = document.getElementById("outputSQL");
    output.select();
    document.execCommand("copy");
    document.getElementById("message").innerHTML = "<span class='success'>Copied to Clipboard ✔</span>";
}

function clearText() {
    document.getElementById("inputSQL").value = "";
    document.getElementById("outputSQL").value = "";
    document.getElementById("message").innerHTML = "";
}
</script>

</body>
</html>
