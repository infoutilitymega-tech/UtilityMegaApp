<head>

        button {

            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            background: #2a5298;

            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        .result-box {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 10px;
        }

        .live-time {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>

<body>

<header>
    <h1>Timestamp Converter</h1>
    <p>Convert Unix timestamp to readable date & date to timestamp instantly.</p>
</header>

<nav>
    <a href="../index.html">Home</a> |
    <a href="../calculators/index.html">Calculators</a> |
    <a href="../developer-tools/index.html">Developer Tools</a> |
    <a href="../security-tools/index.html">Security Tools</a> |
    <a href="../text-tools/index.html">Text Tools</a>
</nav>

<div class="tool-container">

    <div class="live-time">
        Current Unix Timestamp: <span id="liveTimestamp"></span>
    </div>

    <h2>1️⃣ Timestamp → Human Date</h2>
    <input type="text" id="timestampInput" placeholder="Enter Unix timestamp (e.g., 1700000000)">
    <div class="btn-group">
        <button onclick="convertToDate()">Convert</button>
    </div>
    <div id="dateResult" class="result-box"></div>

    <h2>2️⃣ Date → Timestamp</h2>
    <input type="datetime-local" id="dateInput">
    <div class="btn-group">
        <button onclick="convertToTimestamp()">Convert</button>
    </div>
    <div id="timestampResult" class="result-box"></div>

</div>

<footer>
    <p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>
function updateLiveTimestamp() {
    const now = Math.floor(Date.now() / 1000);
    document.getElementById("liveTimestamp").innerText = now;
}
setInterval(updateLiveTimestamp, 1000);
updateLiveTimestamp();

function convertToDate() {
    const ts = document.getElementById("timestampInput").value;
    if (!ts) return;

    const date = new Date(ts * 1000);

    if (isNaN(date.getTime())) {
        document.getElementById("dateResult").innerText = "Invalid Timestamp";
        return;
    }

    document.getElementById("dateResult").innerHTML =
        "Local Time: " + date.toString() + "<br>" +
        "UTC Time: " + date.toUTCString();
}

function convertToTimestamp() {
    const dateVal = document.getElementById("dateInput").value;
    if (!dateVal) return;

    const timestamp = Math.floor(new Date(dateVal).getTime() / 1000);

    document.getElementById("timestampResult").innerText =
        "Unix Timestamp: " + timestamp;
}
</script>

</body>
