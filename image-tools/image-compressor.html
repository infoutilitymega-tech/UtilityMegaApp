<div class="tool-container">

<div class="input-group">
  <label>Select Image</label>
  <input type="file" id="imageInput" accept="image/*">
</div>

<div class="input-group">
  <label>Compression Quality (%)</label>
  <input type="number" id="quality" min="10" max="100" value="70">
</div>

<div class="btn-group">
  <button onclick="compressImage()">Compress Image</button>
  <button onclick="clearForm()">Clear</button>
  <button id="downloadBtn" style="display:none;" onclick="downloadImage()">Download Image</button>
</div>

</div>

<script>
let compressedBlob = null; // store compressed image blob

function compressImage() {
  let fileInput = document.getElementById("imageInput");
  let quality = parseInt(document.getElementById("quality").value)/100;
  let preview = document.getElementById("preview");
  let message = document.getElementById("message");
  let downloadBtn = document.getElementById("downloadBtn");

  if(!fileInput.files || fileInput.files.length === 0){
    message.innerHTML = "<span class='error'>Please select an image ❌</span>";
    downloadBtn.style.display = "none";
    return;
  }

  let file = fileInput.files[0];
  let reader = new FileReader();

  reader.onload = function(event){
    let img = new Image();
    img.src = event.target.result;

    img.onload = function(){
      const MAX_DIMENSION = 1024; // max width or height
      let ratio = Math.min(MAX_DIMENSION / img.width, MAX_DIMENSION / img.height, 1);
      let canvas = document.createElement('canvas');
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      let ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(function(blob){
        compressedBlob = blob; // store blob for download
        let url = URL.createObjectURL(blob);
        preview.src = url;
        message.innerHTML = "<span class='success'>Image compressed successfully ✔</span>";
        downloadBtn.style.display = "inline-block"; // show download button
      }, 'image/jpeg', quality);
    }

    img.onerror = function() {
      message.innerHTML = "<span class='error'>Failed to load image ❌</span>";
      downloadBtn.style.display = "none";
    }
  }

  reader.readAsDataURL(file);
}

function downloadImage(){
  if(!compressedBlob) return;
  let link = document.createElement('a');
  link.href = URL.createObjectURL(compressedBlob);
  link.download = "compressed-image.jpg";
  link.click();
}

function clearForm(){
  document.getElementById("imageInput").value = "";
  document.getElementById("quality").value = 70;
  document.getElementById("preview").src = "";
  document.getElementById("message").innerHTML = "";
  document.getElementById("downloadBtn").style.display = "none";
  compressedBlob = null;
}
</script>
