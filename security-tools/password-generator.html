<body>

<header>
<h1>Password Generator</h1>
<p>Create strong and secure passwords instantly.</p>
</header>

<nav>
<a href="../index.html">Home</a> |
<a href="../calculators/index.html">Calculators</a> |
<a href="../developer-tools/index.html">Developer Tools</a> |

</nav>

<div class="tool-container">

<div class="input-group">
<label>Password Length</label>
<input type="number" id="length" placeholder="Enter password length (8-32)">
</div>

<div class="options">
<label><input type="checkbox" id="uppercase" checked> Include Uppercase (A-Z)</label>
<label><input type="checkbox" id="lowercase" checked> Include Lowercase (a-z)</label>
<label><input type="checkbox" id="numbers" checked> Include Numbers (0-9)</label>
<label><input type="checkbox" id="symbols"> Include Symbols (!@#$)</label>
</div>

<div class="btn-group">
<button onclick="generatePassword()">Generate Password</button>
<button onclick="clearForm()">Clear</button>
</div>

<h2>Result</h2>

<textarea id="result" readonly placeholder="Generated password will appear here..."></textarea>

<div id="message" class="message"></div>

</div>

<footer>
<p>© 2026 UtilityMega.com | All Rights Reserved</p>
</footer>

<script>

function generatePassword(){

let length=document.getElementById("length").value;
let resultBox=document.getElementById("result");
let message=document.getElementById("message");

let upper=document.getElementById("uppercase").checked;
let lower=document.getElementById("lowercase").checked;
let numbers=document.getElementById("numbers").checked;
let symbols=document.getElementById("symbols").checked;

if(!length || length<4){
message.innerHTML="<span class='error'>Please enter password length (min 4) ❌</span>";
return;
}

let chars="";

if(upper) chars+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
if(lower) chars+="abcdefghijklmnopqrstuvwxyz";
if(numbers) chars+="0123456789";
if(symbols) chars+="!@#$%^&*()_+";

if(chars===""){
message.innerHTML="<span class='error'>Select at least one option ❌</span>";
return;
}

let password="";

for(let i=0;i<length;i++){
let random=Math.floor(Math.random()*chars.length);
password+=chars.charAt(random);
}

resultBox.value=password;

message.innerHTML="<span class='success'>Password Generated Successfully ✔</span>";

}

function clearForm(){

document.getElementById("length").value="";
document.getElementById("result").value="";
document.getElementById("message").innerHTML="";

document.getElementById("uppercase").checked=true;
document.getElementById("lowercase").checked=true;
document.getElementById("numbers").checked=true;
document.getElementById("symbols").checked=false;

}

</script>
