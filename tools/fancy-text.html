<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Text Generator - ToolSathi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f6fb;
}

header {
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    padding: 25px;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.container h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #243b55;
}

textarea {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    resize: none;
    margin-bottom: 20px;
    font-size: 16px;
}

.output-box {
    background: #f9f9f9;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.output-text {
    word-break: break-word;
}

.copy-btn {
    padding: 6px 10px;
    background: #243b55;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.copy-btn:hover {
    background: #1b2d40;
}

.back-btn {
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    color: #243b55;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <h1>Fancy Text Generator</h1>
</header>

<div class="container">
    <h2>Convert Normal Text to Fancy Text</h2>

    <textarea id="inputText" rows="3" placeholder="Enter your text here..." onkeyup="generateText()"></textarea>

    <div id="outputs"></div>

    <a href="../index.html" class="back-btn">← Back to Dashboard</a>
</div>

<script>
function generateText() {
    let text = document.getElementById("inputText").value;
    let outputs = document.getElementById("outputs");

    outputs.innerHTML = "";

    if (!text) return;

    let styles = [
        {name: "Bold", transform: t => t.toUpperCase()},
        {name: "Lowercase", transform: t => t.toLowerCase()},
        {name: "Spaced", transform: t => t.split("").join(" ")},
        {name: "Reverse", transform: t => t.split("").reverse().join("")},
        {name: "Stars", transform: t => "★ " + t + " ★"},
        {name: "Wave", transform: t => t.split("").map((c,i)=> i%2 ? c.toLowerCase():c.toUpperCase()).join("")}
    ];

    styles.forEach(style => {
        let fancyText = style.transform(text);

        let box = document.createElement("div");
        box.className = "output-box";

        box.innerHTML = `
            <div class="output-text">${fancyText}</div>
            <button class="copy-btn" onclick="copyText('${fancyText.replace(/'/g,"\\'")}')">Copy</button>
        `;

        outputs.appendChild(box);
    });
}

function copyText(text) {
    navigator.clipboard.writeText(text);
    }
</script>

</body>
</html>
