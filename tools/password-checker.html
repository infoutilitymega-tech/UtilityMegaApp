<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker - ToolSathi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f6fb;
}

header {
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    padding: 25px;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.container h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #243b55;
}

.input-group {
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.strength-bar {
    height: 10px;
    border-radius: 5px;
    margin-top: 15px;
    background: #ddd;
    overflow: hidden;
}

.strength-fill {
    height: 100%;
    width: 0%;
    transition: 0.3s;
}

.result {
    margin-top: 10px;
    font-weight: 600;
    text-align: center;
}

.back-btn {
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    color: #243b55;
    font-size: 14px;
}
</style>

<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>

<body>

<header>
    <h1>Password Strength Checker</h1>
</header>

<div class="container">
    <h2>Check Your Password Strength</h2>

    <div class="input-group">
        <label>Enter Password</label>
        <input type="password" id="password" onkeyup="checkStrength()">
    </div>

    <div class="strength-bar">
        <div class="strength-fill" id="strengthFill"></div>
    </div>

    <div class="result" id="result"></div>

    <a href="../index.html" class="back-btn">← Back to Dashboard</a>
</div>

<script>
function checkStrength() {
    let password = document.getElementById("password").value;
    let strengthFill = document.getElementById("strengthFill");
    let result = document.getElementById("result");

    let strength = 0;

    if (password.length >= 8) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[a-z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;

    switch(strength) {
        case 0:
        case 1:
            strengthFill.style.width = "20%";
            strengthFill.style.background = "red";
            result.innerText = "Very Weak";
            break;
        case 2:
            strengthFill.style.width = "40%";
            strengthFill.style.background = "orange";
            result.innerText = "Weak";
            break;
        case 3:
            strengthFill.style.width = "60%";
            strengthFill.style.background = "gold";
            result.innerText = "Medium";
            break;
        case 4:
            strengthFill.style.width = "80%";
            strengthFill.style.background = "#4caf50";
            result.innerText = "Strong";
            break;
        case 5:
            strengthFill.style.width = "100%";
            strengthFill.style.background = "green";
            result.innerText = "Very Strong";
            break;
    }
}
</script>

</body>
</html>
