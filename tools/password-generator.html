<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator - ToolSathi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f6fb;
}

header {
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    padding: 25px;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.container h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #243b55;
}

.input-group {
    margin-bottom: 15px;
}

.input-group label {
    font-weight: 500;
}

.input-group input[type="number"] {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.options {
    margin: 15px 0;
}

.options label {
    display: block;
    margin-bottom: 8px;
}

button {
    width: 100%;
    padding: 12px;
    background: #243b55;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
}

button:hover {
    background: #1b2d40;
}

.result {
    margin-top: 20px;
    text-align: center;
}

.result input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    text-align: center;
    font-weight: 600;
}

.back-btn {
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    color: #243b55;
    font-size: 14px;
}
</style>

<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>

<body>

<header>
    <h1>Password Generator</h1>
</header>

<div class="container">
    <h2>Create Strong Password</h2>

    <div class="input-group">
        <label>Password Length</label>
        <input type="number" id="length" value="12" min="4" max="32">
    </div>

    <div class="options">
        <label><input type="checkbox" id="uppercase" checked> Include Uppercase (A-Z)</label>
        <label><input type="checkbox" id="lowercase" checked> Include Lowercase (a-z)</label>
        <label><input type="checkbox" id="numbers" checked> Include Numbers (0-9)</label>
        <label><input type="checkbox" id="symbols"> Include Symbols (!@#$)</label>
    </div>

    <button onclick="generatePassword()">Generate Password</button>

    <div class="result">
        <input type="text" id="password" readonly>
        <button onclick="copyPassword()">Copy Password</button>
    </div>

    <a href="../index.html" class="back-btn">← Back to Dashboard</a>
</div>

<script>
function generatePassword() {
    let length = document.getElementById("length").value;
    let upper = document.getElementById("uppercase").checked;
    let lower = document.getElementById("lowercase").checked;
    let number = document.getElementById("numbers").checked;
    let symbol = document.getElementById("symbols").checked;

    let chars = "";

    if (upper) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if (lower) chars += "abcdefghijklmnopqrstuvwxyz";
    if (number) chars += "0123456789";
    if (symbol) chars += "!@#$%^&*()_+";

    if (chars === "") {
        alert("Select at least one option!");
        return;
    }

    let password = "";
    for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    document.getElementById("password").value = password;
}

function copyPassword() {
    let passwordField = document.getElementById("password");
    passwordField.select();
    document.execCommand("copy");
  
}
</script>

</body>
</html>
